<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #FAFAF7;
      --white:       #FFFFFF;
      --gold:        #C8922A;
      --gold-rule:   rgba(200,146,42,0.20);
      --gold-border: rgba(200,146,42,0.78);
      --gold-bg:     rgba(200,146,42,0.05);
      --gold-hover:  rgba(200,146,42,0.08);
      --dark:        #0F1523;
      --meta:        rgba(15,21,35,0.55);
      --ghost:       rgba(15,21,35,0.28);
      --serif:       'Cormorant Garamond', Georgia, serif;
      --sc:          'Cormorant SC', Georgia, serif;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--serif);
      font-weight: 300;
      color: var(--dark);
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,250,247,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gold-rule);
      padding: 0 40px;
      display: flex; align-items: center;
      justify-content: space-between; height: 64px;
    }
    .nav-logo {
      font-family: var(--sc); font-size: 13px;
      letter-spacing: 0.18em; color: var(--dark);
      text-decoration: none;
    }
    .nav-eyebrow {
      font-family: var(--sc); font-size: 11px;
      letter-spacing: 0.14em; color: var(--meta);
    }

    /* ── LAYOUT ── */
    .page {
      max-width: 680px; margin: 0 auto;
      padding: 56px 40px 80px;
    }

    /* ── PHASE INDICATOR ── */
    .phase-indicator {
      display: flex; gap: 8px;
      margin-bottom: 48px;
    }
    .phase-dot {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--sc); font-size: 11px;
      letter-spacing: 0.12em; color: var(--ghost);
      transition: color 0.3s;
    }
    .phase-dot.active { color: var(--gold); }
    .phase-dot.done { color: var(--meta); }
    .phase-dot-circle {
      width: 20px; height: 20px; border-radius: 50%;
      border: 1.5px solid var(--gold-rule);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; transition: all 0.3s;
    }
    .phase-dot.active .phase-dot-circle {
      border-color: var(--gold-border);
      background: var(--gold-bg); color: var(--gold);
    }
    .phase-dot.done .phase-dot-circle {
      border-color: rgba(200,146,42,0.40);
      background: rgba(200,146,42,0.08); color: var(--gold);
    }
    .phase-dot-line {
      flex: 1; height: 1px; background: var(--gold-rule);
      max-width: 40px;
    }

    /* ── EYEBROW ── */
    .eyebrow {
      font-family: var(--sc); font-size: 13px;
      font-weight: 600; letter-spacing: 0.20em;
      color: var(--gold); display: block; margin-bottom: 10px;
    }

    /* ── HEADINGS ── */
    h1 {
      font-family: var(--serif); font-size: clamp(32px, 5vw, 48px);
      font-weight: 300; color: var(--dark);
      line-height: 1.1; margin-bottom: 16px;
    }
    h2 {
      font-family: var(--serif); font-size: clamp(24px, 4vw, 36px);
      font-weight: 300; color: var(--dark);
      line-height: 1.15; margin-bottom: 14px;
    }
    .rule { width: 48px; height: 1px; background: var(--gold-rule); margin-bottom: 24px; }

    /* ── BODY TEXT ── */
    .body-text {
      font-size: 16px; font-weight: 300;
      color: var(--meta); line-height: 1.75;
      margin-bottom: 32px;
    }

    /* ── DOMAIN GRID ── */
    .domain-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 32px;
    }
    .domain-card {
      padding: 18px 20px; border-radius: 14px;
      border: 1.5px solid var(--gold-rule);
      background: var(--white); cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .domain-card:hover {
      border-color: var(--gold-border);
      background: var(--gold-bg);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(15,21,35,0.08);
    }
    .domain-card.selected {
      border-color: var(--gold-border);
      background: var(--gold-bg);
    }
    .domain-card.selected::after {
      content: '✓';
      position: absolute; top: 12px; right: 14px;
      font-family: var(--sc); font-size: 11px;
      color: var(--gold);
    }
    .domain-card.disabled {
      opacity: 0.4; cursor: not-allowed;
      transform: none; box-shadow: none;
    }
    .domain-name {
      font-family: var(--sc); font-size: 13px;
      font-weight: 600; letter-spacing: 0.14em;
      color: var(--dark); margin-bottom: 6px;
    }
    .domain-question {
      font-family: var(--serif); font-size: 13px;
      font-style: italic; color: var(--meta);
      line-height: 1.5;
    }
    .domain-score-bar {
      margin-top: 10px; height: 3px;
      background: rgba(200,146,42,0.12); border-radius: 2px;
      overflow: hidden;
    }
    .domain-score-fill {
      height: 100%; background: var(--gold); border-radius: 2px;
      transition: width 0.8s ease;
    }
    .domain-score-label {
      font-family: var(--sc); font-size: 9px;
      letter-spacing: 0.10em; color: var(--meta);
      margin-top: 4px;
    }

    /* ── WARNING BOX ── */
    .soft-warning {
      padding: 16px 20px; border-radius: 14px;
      border: 1.5px solid var(--gold-rule);
      background: rgba(200,146,42,0.03);
      margin-bottom: 24px;
      font-family: var(--serif); font-size: 14px;
      font-style: italic; color: var(--meta);
      line-height: 1.7;
    }

    /* ── QUARTER CHOICE ── */
    .quarter-options {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 32px;
    }
    .quarter-option {
      padding: 18px 20px; border-radius: 14px;
      border: 1.5px solid var(--gold-rule);
      background: var(--white); cursor: pointer;
      transition: all 0.2s;
    }
    .quarter-option:hover, .quarter-option.selected {
      border-color: var(--gold-border);
      background: var(--gold-bg);
    }
    .quarter-option-title {
      font-family: var(--sc); font-size: 13px;
      font-weight: 600; letter-spacing: 0.12em;
      color: var(--dark); margin-bottom: 4px;
    }
    .quarter-option-date {
      font-family: var(--serif); font-size: 14px;
      font-style: italic; color: var(--gold);
      margin-bottom: 6px;
    }
    .quarter-option-desc {
      font-family: var(--serif); font-size: 13px;
      color: var(--meta); line-height: 1.5;
    }

    /* ── CHAT AREA ── */
    .chat-area {
      display: flex; flex-direction: column;
      gap: 20px; margin-bottom: 24px;
    }
    .msg-assistant {
      font-family: var(--serif); font-size: 16px;
      font-weight: 300; color: var(--dark);
      line-height: 1.75; padding: 20px 24px;
      background: var(--gold-bg);
      border: 1.5px solid var(--gold-rule);
      border-radius: 14px;
      animation: fadeUp 0.3s ease;
    }
    .msg-user {
      font-family: var(--serif); font-size: 16px;
      font-weight: 300; color: var(--meta);
      line-height: 1.65; padding: 16px 20px;
      background: var(--white);
      border: 1.5px solid var(--gold-rule);
      border-radius: 14px;
      align-self: flex-end; max-width: 85%;
      animation: fadeUp 0.3s ease;
    }
    .msg-system {
      font-family: var(--sc); font-size: 11px;
      letter-spacing: 0.14em; color: var(--gold);
      text-align: center; padding: 8px 0;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TYPING ── */
    .typing {
      display: flex; gap: 4px; padding: 16px 20px;
      align-items: center;
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); opacity: 0.5;
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    /* ── INPUT — inline, not fixed ── */
    .inline-input-wrap {
      margin-top: 24px;
      border: 1.5px solid var(--gold-border);
      border-radius: 14px;
      background: var(--white);
      overflow: hidden;
    }
    .input-field {
      width: 100%; padding: 18px 20px;
      font-family: var(--serif); font-size: 16px;
      font-weight: 300; color: var(--dark);
      background: transparent;
      border: none; outline: none; resize: none;
      min-height: 80px; max-height: 220px;
      line-height: 1.7;
    }
    .input-field::placeholder { color: var(--ghost); font-style: italic; }
    .inline-input-actions {
      display: flex; justify-content: flex-end;
      padding: 10px 16px;
      border-top: 1px solid var(--gold-rule);
      background: rgba(200,146,42,0.02);
    }
    .send-btn {
      padding: 12px 28px; border-radius: 40px;
      border: 1.5px solid var(--gold-border);
      background: var(--gold-bg); color: var(--gold);
      font-family: var(--sc); font-size: 13px;
      font-weight: 600; letter-spacing: 0.14em;
      cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(15,21,35,0.08);
      border-color: var(--gold); background: var(--gold-hover);
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-block; padding: 16px 36px;
      border-radius: 40px; border: 1.5px solid var(--gold-border);
      background: var(--gold-bg); color: var(--gold);
      font-family: var(--sc); font-size: 16px;
      font-weight: 600; letter-spacing: 0.16em;
      cursor: pointer; transition: all 0.2s;
      text-decoration: none;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(15,21,35,0.08);
      border-color: var(--gold); background: var(--gold-hover);
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-ghost {
      background: none; border-color: var(--gold-rule); color: var(--meta);
    }

    /* ── GOAL SUMMARY CARD ── */
    .goal-card {
      padding: 24px 28px; border-radius: 14px;
      border: 1.5px solid var(--gold-border);
      background: var(--gold-bg); margin-bottom: 20px;
    }
    .goal-card-domain {
      font-family: var(--sc); font-size: 11px;
      font-weight: 600; letter-spacing: 0.18em;
      color: var(--gold); margin-bottom: 10px;
    }
    .goal-card-outcome {
      font-family: var(--serif); font-size: 18px;
      font-weight: 300; color: var(--dark);
      line-height: 1.55; margin-bottom: 16px;
    }
    .goal-card-milestones {
      display: flex; flex-direction: column; gap: 8px;
    }
    .milestone {
      display: flex; gap: 12px; align-items: baseline;
    }
    .milestone-label {
      font-family: var(--sc); font-size: 9px;
      letter-spacing: 0.12em; color: var(--meta);
      flex-shrink: 0; width: 60px;
    }
    .milestone-text {
      font-family: var(--serif); font-size: 14px;
      font-weight: 300; color: var(--dark);
      line-height: 1.55;
    }

    /* ── TEA ANCHORS ── */
    .tea-section { margin-top: 20px; }
    .tea-label {
      font-family: var(--sc); font-size: 11px;
      font-weight: 600; letter-spacing: 0.18em;
      color: var(--meta); margin-bottom: 10px;
      display: block;
    }
    .tea-anchor {
      padding: 12px 16px; border-radius: 10px;
      border: 1.5px solid var(--gold-rule);
      background: var(--white); margin-bottom: 8px;
      display: flex; gap: 10px; align-items: baseline;
    }
    .tea-type {
      font-family: var(--sc); font-size: 9px;
      letter-spacing: 0.12em; color: var(--gold);
      flex-shrink: 0; width: 72px;
    }
    .tea-text {
      font-family: var(--serif); font-size: 14px;
      font-weight: 300; color: var(--dark);
      line-height: 1.55;
    }

    /* ── EDIT OVERLAY ── */
    .edit-overlay {
      background: rgba(15,21,35,0.04);
      border: 1.5px dashed rgba(200,146,42,0.35);
      border-radius: 14px; padding: 16px;
      margin-top: 12px; display: none;
    }
    .edit-overlay.open { display: block; }
    .edit-textarea {
      width: 100%; min-height: 80px;
      font-family: var(--serif); font-size: 15px;
      font-weight: 300; color: var(--dark);
      background: var(--white);
      border: 1.5px solid var(--gold-border);
      border-radius: 10px; padding: 12px 16px;
      outline: none; resize: vertical;
      line-height: 1.65;
    }
    .edit-hint {
      font-family: var(--serif); font-size: 13px;
      font-style: italic; color: var(--ghost);
      margin-top: 6px;
    }
    .edit-toggle {
      font-family: var(--serif); font-size: 13px;
      font-style: italic; color: var(--meta);
      background: none; border: none; cursor: pointer;
      padding: 0; transition: color 0.2s; margin-top: 10px;
    }
    .edit-toggle:hover { color: var(--gold); }

    /* ── DOMAIN SELF-RATE ── */
    .self-rate-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 32px; }
    .self-rate-row { display: flex; flex-direction: column; gap: 6px; }
    .self-rate-label {
      font-family: var(--sc); font-size: 12px;
      letter-spacing: 0.12em; color: var(--dark);
    }
    .self-rate-question {
      font-family: var(--serif); font-size: 13px;
      font-style: italic; color: var(--meta); margin-bottom: 6px;
    }
    .self-rate-buttons {
      display: flex; gap: 4px;
    }
    .rate-btn {
      flex: 1; padding: 8px 0;
      font-family: var(--sc); font-size: 10px;
      border: 1px solid var(--gold-rule);
      background: var(--white); color: var(--meta);
      cursor: pointer; border-radius: 6px;
      transition: all 0.15s;
    }
    .rate-btn.selected {
      border-color: var(--gold-border);
      background: var(--gold-bg); color: var(--gold);
    }
    .rate-btn:hover:not(.selected) {
      border-color: rgba(200,146,42,0.45);
      background: rgba(200,146,42,0.04);
    }

    /* ── COMPLETION ── */
    .completion-header {
      text-align: center; padding: 40px 0 32px;
      border-bottom: 1px solid var(--gold-rule);
      margin-bottom: 40px;
    }
    .completion-glyph {
      font-size: 32px; margin-bottom: 16px;
      display: block;
    }

    /* ── SAVE TOAST ── */
    .save-toast {
      position: fixed; bottom: 100px; right: 24px;
      padding: 10px 18px; background: var(--dark);
      color: var(--white); font-family: var(--sc);
      font-size: 11px; letter-spacing: 0.12em;
      border-radius: 40px; z-index: 200;
      opacity: 0; transform: translateY(8px);
      transition: all 0.3s; pointer-events: none;
    }
    .save-toast.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 640px) {
      .nav { padding: 0 20px; }
      .page { padding: 40px 20px 60px; }
      .input-area { padding: 12px 20px 20px; }
      .domain-grid { grid-template-columns: 1fr; }
      .quarter-options { grid-template-columns: 1fr; }
    }
  </style>
</head>

<nav class="nav">
  <a class="nav-logo" href="https://nextus.world">NextUs</a>
  <span class="nav-eyebrow">Life OS · Target Goals</span>
</nav>

<div class="save-toast" id="saveToast">Saved</div>

<div class="page" id="app">
  <!-- Rendered by JS -->
</div>

<script src="/app.js"></script>
</body>
